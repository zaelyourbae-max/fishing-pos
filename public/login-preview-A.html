<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Preview A</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #020617; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
  .phone { width: 390px; min-height: 844px; display: flex; flex-direction: column; overflow: hidden; }

  /* HERO */
  .hero {
    padding: 56px 24px 60px;
    background: linear-gradient(180deg, #0f172a 0%, #0c2520 55%, #0a5c52 100%);
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute; top: -40px; left: -40px;
    width: 260px; height: 260px; border-radius: 50%;
    background: radial-gradient(circle, #14b8a6, transparent);
    filter: blur(60px); opacity: 0.3; pointer-events: none;
  }
  .toggle {
    position: absolute; top: 20px; right: 20px;
    width: 52px; height: 26px; border-radius: 13px;
    background: rgba(20,184,166,0.25); border: 1px solid rgba(20,184,166,0.3);
    display: flex; align-items: center; padding: 0 3px;
  }
  .toggle-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: #1e293b; display: flex; align-items: center; justify-content: center;
  }
  .brand { position: relative; z-index: 1; margin-top: 8px; }
  .brand h1 { font-size: 42px; font-weight: 900; color: white; line-height: 1; letter-spacing: -1px; }
  .brand .sub { margin-top: 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #2dd4bf; }
  .brand p { margin-top: 14px; font-size: 14px; color: #94a3b8; max-width: 240px; line-height: 1.6; }
  .pills { position: relative; z-index: 1; margin-top: 22px; display: flex; gap: 8px; }
  .pill { padding: 5px 13px; border-radius: 999px; font-size: 12px; font-weight: 600; background: rgba(20,184,166,0.15); border: 1px solid rgba(20,184,166,0.25); color: #5eead4; }

  /* CARD — floating dengan margin kiri kanan */
  .card-wrapper { flex: 1; padding: 0 12px 20px; margin-top: -28px; }
  .card {
    border-radius: 28px;
    padding: 32px 22px 28px;
    background: #0b1120;
    border: 1px solid rgba(20,184,166,0.4);
    box-shadow: 0 -16px 48px rgba(13,148,136,0.35), 0 8px 40px rgba(0,0,0,0.5);
  }

  .lock-wrap { display: flex; justify-content: center; margin-bottom: 18px; }
  .lock-icon {
    width: 52px; height: 52px; border-radius: 16px;
    background: linear-gradient(135deg, #0d9488, #0f766e);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 28px rgba(20,184,166,0.5);
  }
  .lock-icon svg { width: 26px; height: 26px; color: white; }
  .form-title { text-align: center; font-size: 26px; font-weight: 900; color: white; margin-bottom: 6px; }
  .form-sub { text-align: center; font-size: 13px; color: #64748b; margin-bottom: 24px; }

  label { display: block; font-size: 13px; font-weight: 700; color: #cbd5e1; margin-bottom: 6px; }
  input {
    width: 100%; padding: 13px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: white; font-size: 14px; outline: none; margin-bottom: 14px;
    font-family: inherit;
  }
  input::placeholder { color: #475569; }
  input:focus { border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.2); }
  .pass-wrap { position: relative; margin-bottom: 20px; }
  .pass-wrap input { margin-bottom: 0; padding-right: 46px; }
  .eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #475569; }
  .btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #0d9488, #0f766e);
    color: white; font-size: 15px; font-weight: 700; font-family: inherit;
    box-shadow: 0 4px 24px rgba(20,184,166,0.45);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .footer { text-align: center; margin-top: 20px; font-size: 11px; color: #1e293b; font-weight: 600; }
  .label-a { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #0d9488; color: white; padding: 6px 16px; border-radius: 999px; font-size: 12px; font-weight: 700; }
</style>
</head>
<body>
<div class="phone">
  <div class="hero">
    <div class="glow"></div>
    <div class="toggle"><div class="toggle-dot">
      <svg width="10" height="10" fill="#2dd4bf" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
    </div></div>
    <div class="brand">
      <h1>MEIJRVERSE°</h1>
      <div class="sub">Retail Operating System</div>
      <p>Sistem kasir yang cepat, akurat, dan terpercaya.</p>
    </div>
    <div class="pills">
      <span class="pill">Kasir</span>
      <span class="pill">Inventori</span>
      <span class="pill">Laporan</span>
    </div>
  </div>

  <div class="card-wrapper">
    <div class="card">
      <div class="lock-wrap">
        <div class="lock-icon">
          <svg fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
      </div>
      <div class="form-title">Masuk ke Sistem</div>
      <div class="form-sub">Masukkan kredensial Anda</div>

      <label>Email</label>
      <input type="email" placeholder="nama@meijrverse.com">

      <label>Password</label>
      <div class="pass-wrap">
        <input type="password" placeholder="••••••••">
        <button class="eye">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button class="btn">Login <svg width="18" height="18" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
      <div class="footer">© 2026 MEIJRVERSE°. All rights reserved.</div>
    </div>
  </div>
</div>
<div class="label-a">Opsi A</div>
</body>
</html>
