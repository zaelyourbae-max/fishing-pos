<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Preview B</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #020617; display: flex; justify-content: center; min-height: 100vh; }
  .phone { width: 390px; min-height: 844px; display: flex; flex-direction: column; }

  /* HERO — lebih tinggi, gradient lebih gelap */
  .hero {
    padding: 60px 24px 72px;
    background: linear-gradient(160deg, #0a0f1e 0%, #0d1f1d 50%, #083d36 100%);
    position: relative; overflow: hidden;
  }
  .glow1 { position: absolute; top: -50px; left: -50px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, #14b8a6, transparent); filter: blur(70px); opacity: 0.25; pointer-events: none; }
  .glow2 { position: absolute; bottom: 0; right: -30px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #0d9488, transparent); filter: blur(50px); opacity: 0.2; pointer-events: none; }
  .toggle {
    position: absolute; top: 20px; right: 20px;
    width: 52px; height: 26px; border-radius: 13px;
    background: rgba(20,184,166,0.2); border: 1px solid rgba(20,184,166,0.25);
    display: flex; align-items: center; padding: 0 3px;
  }
  .toggle-dot { width: 20px; height: 20px; border-radius: 50%; background: #1e293b; display: flex; align-items: center; justify-content: center; }
  .brand { position: relative; z-index: 1; margin-top: 8px; }
  .brand h1 { font-size: 44px; font-weight: 900; color: white; line-height: 1; letter-spacing: -1.5px; }
  .brand .sub { margin-top: 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #2dd4bf; }
  .brand p { margin-top: 16px; font-size: 14px; color: #94a3b8; max-width: 230px; line-height: 1.65; }
  .pills { position: relative; z-index: 1; margin-top: 20px; display: flex; gap: 8px; }
  .pill { padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; background: rgba(20,184,166,0.12); border: 1px solid rgba(20,184,166,0.22); color: #5eead4; }

  /* CARD — full width dengan rounded-t besar, efek raised */
  .card-outer { flex: 1; margin-top: -36px; position: relative; }
  .card {
    border-radius: 36px 36px 0 0;
    padding: 36px 24px 28px;
    background: #080f1c;
    height: 100%;
    border-top: 1.5px solid rgba(20,184,166,0.45);
    border-left: 1px solid rgba(20,184,166,0.12);
    border-right: 1px solid rgba(20,184,166,0.12);
    box-shadow: 0 -20px 60px rgba(13,148,136,0.3), 0 -40px 80px rgba(0,0,0,0.6);
  }

  .lock-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
  .lock-icon {
    width: 54px; height: 54px; border-radius: 18px;
    background: linear-gradient(135deg, #0d9488, #0f766e);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 32px rgba(20,184,166,0.55), 0 0 0 8px rgba(20,184,166,0.08);
  }
  .form-title { text-align: center; font-size: 27px; font-weight: 900; color: white; margin-bottom: 6px; letter-spacing: -0.5px; }
  .form-sub { text-align: center; font-size: 13px; color: #4b5563; margin-bottom: 26px; }

  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 700; color: #94a3b8; margin-bottom: 7px; }
  input {
    width: 100%; padding: 13px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    color: white; font-size: 14px; outline: none; font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder { color: #374151; }
  input:focus { border-color: rgba(13,148,136,0.6); box-shadow: 0 0 0 3px rgba(13,148,136,0.15); }
  .pass-wrap { position: relative; }
  .pass-wrap input { padding-right: 46px; }
  .eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #374151; }
  .btn {
    width: 100%; margin-top: 6px; padding: 15px; border-radius: 12px; border: none; cursor: pointer;
    background: linear-gradient(135deg, #0d9488, #0a6b5f);
    color: white; font-size: 15px; font-weight: 700; font-family: inherit;
    box-shadow: 0 4px 28px rgba(13,148,136,0.5);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .footer { text-align: center; margin-top: 22px; font-size: 11px; color: #1a2540; font-weight: 600; }
  .label-b { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #0d9488; color: white; padding: 6px 16px; border-radius: 999px; font-size: 12px; font-weight: 700; }
</style>
</head>
<body>
<div class="phone">
  <div class="hero">
    <div class="glow1"></div>
    <div class="glow2"></div>
    <div class="toggle"><div class="toggle-dot">
      <svg width="10" height="10" fill="#2dd4bf" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
    </div></div>
    <div class="brand">
      <h1>MEIJRVERSE°</h1>
      <div class="sub">Retail Operating System</div>
      <p>Sistem kasir yang cepat, akurat, dan terpercaya.</p>
    </div>
    <div class="pills">
      <span class="pill">Kasir</span>
      <span class="pill">Inventori</span>
      <span class="pill">Laporan</span>
    </div>
  </div>

  <div class="card-outer">
    <div class="card">
      <div class="lock-wrap">
        <div class="lock-icon">
          <svg width="26" height="26" fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
      </div>
      <div class="form-title">Masuk ke Sistem</div>
      <div class="form-sub">Masukkan kredensial Anda</div>

      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="nama@meijrverse.com">
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pass-wrap">
          <input type="password" placeholder="••••••••">
          <button class="eye"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>

      <button class="btn">Login <svg width="18" height="18" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
      <div class="footer">© 2026 MEIJRVERSE°. All rights reserved.</div>
    </div>
  </div>
</div>
<div class="label-b">Opsi B</div>
</body>
</html>
